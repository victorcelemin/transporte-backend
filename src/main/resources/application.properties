# ============================================
# TRANSPORTE BACKEND - CLOUD RUN
# ============================================

# Puerto dinámico
server.port=${PORT:8080}

# ============================================
# BASE DE DATOS
# Detecta automáticamente MySQL o H2 según DB_URL
# ============================================
spring.datasource.url=${DB_URL:jdbc:h2:mem:transporte_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:Y2FtYXNldHJhbnNwb3J0ZWJhc2VlbmNyeXB0b2tleXNlY3JldGhpcyRmMWMyZjNhZi1lMjM0LTQ0ODMtODFmYy1mNjc3ODkwMTIzNDMyZTI}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.security=INFO
logging.level.com.transporte=INFO