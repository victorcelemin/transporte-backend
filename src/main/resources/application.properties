# ============================================
# TRANSPORTE BACKEND - RENDER PRODUCTION
# ============================================

# Puerto dinámico de Render
server.port=${PORT:8080}

# ============================================
# BASE DE DATOS - Variables de Entorno
# ============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/transporte_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:Y2FtYXNldHJhbnNwb3J0ZWJhc2VlbmNyeXB0b2tleXNlY3JldGhpcyRmMWMyZjNhZi1lMjM0LTQ0ODMtODFmYy1mNjc3ODkwMTIzNDMyZTI}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.security=INFO
logging.level.com.transporte=INFO
logging.level.org.hibernate.SQL=DEBUG