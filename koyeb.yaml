# Koyeb App Configuration
app: transporte-backend
build:
  buildCommand: mvn clean package -DskipTests
  dockerfile: Dockerfile
run:
  command: java -jar target/transporte-backend-1.0.0.jar
  envVars:
    - key: DB_URL
      value: ${DB_URL}
    - key: DB_USER
      value: ${DB_USER}
    - key: DB_PASSWORD
      value: ${DB_PASSWORD}
